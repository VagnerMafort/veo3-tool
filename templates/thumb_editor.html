<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Editor Visual — Klyonclaw Studio</title>
<link rel="icon" type="image/png" href="/static/icone.png"/>
<link rel="apple-touch-icon" href="/static/icone.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111827;border-bottom:1px solid #1e3a5f;gap:8px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{font-size:.95rem;font-weight:700;white-space:nowrap}.topbar h1 span{color:#4a9eff}
.topbar-center{display:flex;gap:4px;flex-wrap:wrap}
.tb{padding:6px 10px;border:1px solid #1e3a5f;background:#0f172a;color:#94a3b8;border-radius:6px;font-size:.75rem;cursor:pointer;transition:.2s;white-space:nowrap}
.tb:hover{border-color:#4a9eff;color:#fff}
.tb.active{background:#2563eb;border-color:#2563eb;color:#fff}
.tb-icon{font-size:.9rem}
.topbar-right{display:flex;gap:6px}
.tb-green{background:#059669;border-color:#059669;color:#fff}.tb-green:hover{background:#047857}
.tb-blue{background:#2563eb;border-color:#2563eb;color:#fff}.tb-blue:hover{background:#4a9eff}
.tb-back{background:none;border:1px solid #1e3a5f;color:#94a3b8}.tb-back:hover{border-color:#4a9eff;color:#fff}

.editor-wrap{display:flex;height:calc(100vh - 50px)}
.sidebar{width:260px;background:#111827;border-right:1px solid #1e3a5f;padding:14px;overflow-y:auto;flex-shrink:0}
.sidebar h3{font-size:.78rem;color:#4a9eff;margin:14px 0 8px;padding-top:10px;border-top:1px solid #1e3a5f;text-transform:uppercase;letter-spacing:.5px}
.sidebar h3:first-child{border:none;margin-top:0;padding-top:0}
.sidebar label{display:block;font-size:.75rem;color:#64748b;margin:8px 0 3px}
.si{width:100%;padding:7px 8px;background:#0f172a;border:1px solid #1e3a5f;border-radius:5px;color:#e2e8f0;font-size:.8rem;outline:none}
.si:focus{border-color:#4a9eff}
.si-ta{resize:vertical;min-height:40px;font-family:inherit}
.cr{display:flex;gap:6px;align-items:center}
.cr input[type="color"]{width:32px;height:28px;padding:1px;cursor:pointer;border:1px solid #1e3a5f;border-radius:4px;background:none}
.sb{padding:6px 10px;background:#0f172a;border:1px solid #1e3a5f;border-radius:5px;color:#94a3b8;font-size:.75rem;cursor:pointer;transition:.2s;text-align:center}
.sb:hover{border-color:#4a9eff;color:#fff}
.sb-full{width:100%;margin-top:6px}
.layers-list{margin-top:8px}
.ly{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#0f172a;border:1px solid #1e3a5f;border-radius:5px;margin-bottom:4px;font-size:.75rem;color:#94a3b8;cursor:pointer}
.ly.active{border-color:#4a9eff;color:#fff}
.ly-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:.85rem;padding:0 4px}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#0a0e1a;position:relative;overflow:hidden}
.canvas-container{border:1px solid #1e3a5f !important}
.upload-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10}
.upload-box{text-align:center;color:#475569}
.upload-box .icon{font-size:3rem;margin-bottom:12px}
.upload-box p{font-size:.9rem;margin-bottom:16px}
.upload-box label{display:inline-block;padding:12px 28px;background:#2563eb;color:#fff;border-radius:10px;font-weight:600;cursor:pointer}
.upload-box label:hover{background:#4a9eff}
.upload-box input{display:none}
.props-section{display:none}
@media(max-width:768px){.editor-wrap{flex-direction:column}.sidebar{width:100%;max-height:35vh;border-right:none;border-bottom:1px solid #1e3a5f}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>✏️ Editor <span>Visual</span></h1>
  </div>
  <div class="topbar-center">
    <button class="tb" onclick="undo()" title="Desfazer"><span class="tb-icon">↩️</span> Desfazer</button>
    <button class="tb" onclick="redo()" title="Refazer"><span class="tb-icon">↪️</span> Refazer</button>
    <button class="tb" onclick="duplicateObj()" title="Duplicar"><span class="tb-icon">📋</span> Duplicar</button>
    <button class="tb" onclick="deleteObj()" title="Apagar"><span class="tb-icon">🗑️</span> Apagar</button>
    <button class="tb" onclick="bringForward()" title="Frente">⬆️</button>
    <button class="tb" onclick="sendBackward()" title="Trás">⬇️</button>
    <button class="tb" onclick="centerObj()" title="Centralizar">⊞</button>
    <button class="tb" onclick="lockObj()" title="Bloquear/Desbloquear">🔒</button>
    <button class="tb" onclick="rotateObj(-15)" title="Girar esquerda">↺</button>
    <button class="tb" onclick="rotateObj(15)" title="Girar direita">↻</button>
  </div>
  <div class="topbar-right">
    <button class="tb tb-back" onclick="window.location.href='/dashboard'">← Voltar</button>
    <button class="tb tb-green" onclick="saveProject()">💾 Salvar</button>
    <button class="tb tb-blue" onclick="exportPNG(1280,720)">⬇ 1280×720</button>
    <button class="tb tb-blue" onclick="exportPNG(2048,1152)">⬇ 2048×1152</button>
  </div>
</div>
<div class="editor-wrap">
  <div class="sidebar">
    <h3>🔧 Adicionar</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="sb" onclick="addText()">T Texto</button>
      <button class="sb" onclick="addArrow()">➡️ Seta</button>
      <button class="sb" onclick="addCircle()">⭕ Círculo</button>
      <button class="sb" onclick="addRect()">⬜ Retângulo</button>
      <button class="sb" onclick="addLine()">— Linha</button>
      <label class="sb" style="cursor:pointer">📷 Imagem<input type="file" accept="image/*" style="display:none" onchange="addImage(this)"/></label>
    </div>

    <div id="propsText" class="props-section">
      <h3>📝 Texto</h3>
      <label>Conteúdo</label>
      <textarea class="si si-ta" id="pTxt" oninput="updateProp('text',this.value)">TEXTO</textarea>
      <label>Fonte</label>
      <select class="si" id="pFont" onchange="updateProp('fontFamily',this.value)">
        <option value="Impact">Impact</option>
        <option value="Arial Black">Arial Black</option>
        <option value="Helvetica">Helvetica</option>
        <option value="Verdana">Verdana</option>
        <option value="Georgia">Georgia</option>
        <option value="Trebuchet MS">Trebuchet MS</option>
        <option value="Courier New">Courier New</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
      </select>
      <label>Tamanho</label>
      <input type="range" class="si" id="pSize" min="16" max="150" value="60" oninput="updateProp('fontSize',+this.value)"/>
      <label>Cor</label>
      <div class="cr"><input type="color" id="pColor" value="#ffffff" oninput="updateProp('fill',this.value)"/><input class="si" style="flex:1" id="pColorH" value="#ffffff" oninput="document.getElementById('pColor').value=this.value;updateProp('fill',this.value)"/></div>
      <label>Contorno</label>
      <div class="cr"><input type="color" id="pStroke" value="#000000" oninput="updateProp('stroke',this.value)"/><input type="range" class="si" style="flex:1" id="pStrokeW" min="0" max="10" value="3" oninput="updateProp('strokeWidth',+this.value)"/></div>
      <label>Sombra</label>
      <div class="cr"><input type="color" id="pShadowC" value="#000000" oninput="updateShadow()"/><input type="range" class="si" style="flex:1" id="pShadowB" min="0" max="30" value="8" oninput="updateShadow()"/></div>
      <div style="display:flex;gap:4px;margin-top:8px">
        <button class="sb" style="flex:1" onclick="updateProp('fontWeight','bold')">B</button>
        <button class="sb" style="flex:1" onclick="updateProp('fontStyle','italic')">I</button>
        <button class="sb" style="flex:1" onclick="updateProp('underline',!fCanvas.getActiveObject()?.underline)">U</button>
      </div>
      <label>Espaçamento</label>
      <input type="range" class="si" id="pSpacing" min="0" max="500" value="0" oninput="updateProp('charSpacing',+this.value)"/>
    </div>

    <div id="propsShape" class="props-section">
      <h3>🔷 Forma</h3>
      <label>Cor</label>
      <div class="cr"><input type="color" id="pShapeColor" value="#ef4444" oninput="updateShapeProp('stroke',this.value)"/></div>
      <label>Preenchimento</label>
      <div class="cr"><input type="color" id="pShapeFill" value="#00000000" oninput="updateShapeProp('fill',this.value)"/><button class="sb" onclick="updateShapeProp('fill','transparent')" style="font-size:.7rem">Sem</button></div>
      <label>Espessura</label>
      <input type="range" class="si" id="pShapeW" min="1" max="15" value="4" oninput="updateShapeProp('strokeWidth',+this.value)"/>
      <label>Opacidade</label>
      <input type="range" class="si" id="pOpacity" min="10" max="100" value="100" oninput="updateShapeProp('opacity',this.value/100)"/>
    </div>

    <div id="propsImage" class="props-section">
      <h3>🖼️ Imagem</h3>
      <label>Opacidade</label>
      <input type="range" class="si" id="pImgOpacity" min="10" max="100" value="100" oninput="updateShapeProp('opacity',this.value/100)"/>
      <label>Brilho</label>
      <input type="range" class="si" id="pBrightness" min="-50" max="50" value="0" oninput="applyImgFilters()"/>
      <label>Contraste</label>
      <input type="range" class="si" id="pContrast" min="-50" max="50" value="0" oninput="applyImgFilters()"/>
      <label>Blur</label>
      <input type="range" class="si" id="pBlur" min="0" max="50" value="0" oninput="applyImgFilters()"/>
      <button class="sb sb-full" onclick="document.getElementById('pBrightness').value=0;document.getElementById('pContrast').value=0;document.getElementById('pBlur').value=0;applyImgFilters()">✕ Resetar filtros</button>
    </div>

    <h3>📐 Camadas</h3>
    <div id="layersList" class="layers-list"></div>

    <h3>🤖 IA</h3>
    <button class="sb sb-full" onclick="enviarParaIA()">✨ Editar com IA</button>
    <button class="sb sb-full" onclick="viralTuningEditor()">⚡ Viral Tuning</button>

    <h3>💾 Salvar</h3>
    <button class="sb sb-full" onclick="saveProject()" style="background:#059669;border-color:#059669;color:#fff">💾 Salvar projeto</button>
    <button class="sb sb-full" onclick="salvarNaBiblioteca()">🗃️ Salvar na biblioteca</button>
  </div>
  <div class="canvas-area">
    <div class="upload-overlay" id="uploadOverlay">
      <div class="upload-box">
        <div class="icon">🖼️</div>
        <p>Envie uma thumbnail pra editar</p>
        <label>Selecionar imagem<input type="file" id="fileUpload" accept="image/*"/></label>
      </div>
    </div>
    <canvas id="c"></canvas>
  </div>
</div>

<script>
const W=1280,H=720;
let fCanvas, history=[], historyIdx=-1, ignoreHistory=false;

// Init Fabric
fCanvas=new fabric.Canvas('c',{width:W,height:H,backgroundColor:'#1a1a2e',preserveObjectStacking:true});
scaleCanvas();
window.addEventListener('resize',scaleCanvas);

function scaleCanvas(){
  const area=document.querySelector('.canvas-area');
  const maxW=area.clientWidth-40,maxH=area.clientHeight-40;
  const scale=Math.min(maxW/W,maxH/H,1);
  fCanvas.setZoom(scale);
  fCanvas.setWidth(W*scale);fCanvas.setHeight(H*scale);
}

// Upload background
document.getElementById('fileUpload').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    fabric.Image.fromURL(ev.target.result,img=>{
      const scale=Math.max(W/img.width,H/img.height);
      img.set({scaleX:scale,scaleY:scale,left:W/2,top:H/2,originX:'center',originY:'center',selectable:false,evented:false,name:'background'});
      fCanvas.insertAt(img,0);fCanvas.renderAll();
      document.getElementById('uploadOverlay').style.display='none';
      saveHistory();updateLayers();
    });
  };reader.readAsDataURL(file);
});

// Load from URL param
const urlThumb=new URLSearchParams(window.location.search).get('thumb');
if(urlThumb){
  fabric.Image.fromURL(`/ver_thumbnail/${urlThumb}?t=${Date.now()}`,img=>{
    if(!img)return;
    const scale=Math.max(W/img.width,H/img.height);
    img.set({scaleX:scale,scaleY:scale,left:W/2,top:H/2,originX:'center',originY:'center',selectable:false,evented:false,name:'background'});
    fCanvas.insertAt(img,0);fCanvas.renderAll();
    document.getElementById('uploadOverlay').style.display='none';
    saveHistory();updateLayers();
  },{crossOrigin:'anonymous'});
}

// Add elements
function addText(){
  const t=new fabric.IText('TEXTO',{left:W/2,top:H/2,originX:'center',originY:'center',fontFamily:'Impact',fontSize:60,fill:'#ffffff',stroke:'#000000',strokeWidth:3,shadow:new fabric.Shadow({color:'#000',blur:8,offsetX:3,offsetY:3}),fontWeight:'bold',name:'Texto'});
  fCanvas.add(t);fCanvas.setActiveObject(t);fCanvas.renderAll();saveHistory();updateLayers();
}
function addArrow(){
  const line=new fabric.Line([W/2-80,H/2,W/2+80,H/2],{stroke:'#ef4444',strokeWidth:4,strokeLineCap:'round',name:'Seta'});
  const head=new fabric.Triangle({left:W/2+80,top:H/2,width:20,height:30,fill:'#ef4444',angle:90,originX:'center',originY:'center'});
  const group=new fabric.Group([line,head],{left:W/2,top:H/2,originX:'center',originY:'center',name:'Seta'});
  fCanvas.add(group);fCanvas.setActiveObject(group);fCanvas.renderAll();saveHistory();updateLayers();
}
function addCircle(){
  const c=new fabric.Ellipse({left:W/2,top:H/2,rx:60,ry:60,fill:'transparent',stroke:'#ef4444',strokeWidth:4,originX:'center',originY:'center',name:'Círculo'});
  fCanvas.add(c);fCanvas.setActiveObject(c);fCanvas.renderAll();saveHistory();updateLayers();
}
function addRect(){
  const r=new fabric.Rect({left:W/2,top:H/2,width:120,height:80,fill:'transparent',stroke:'#4a9eff',strokeWidth:3,originX:'center',originY:'center',rx:8,ry:8,name:'Retângulo'});
  fCanvas.add(r);fCanvas.setActiveObject(r);fCanvas.renderAll();saveHistory();updateLayers();
}
function addLine(){
  const l=new fabric.Line([W/2-80,H/2,W/2+80,H/2],{stroke:'#ffffff',strokeWidth:3,strokeLineCap:'round',name:'Linha'});
  fCanvas.add(l);fCanvas.setActiveObject(l);fCanvas.renderAll();saveHistory();updateLayers();
}
function addImage(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{fabric.Image.fromURL(e.target.result,img=>{
    img.scaleToWidth(200);img.set({left:W/2,top:H/2,originX:'center',originY:'center',name:'Imagem'});
    fCanvas.add(img);fCanvas.setActiveObject(img);fCanvas.renderAll();saveHistory();updateLayers();
  });};reader.readAsDataURL(input.files[0]);
}

// Properties panel
fCanvas.on('selection:created',showProps);
fCanvas.on('selection:updated',showProps);
fCanvas.on('selection:cleared',()=>{document.getElementById('propsText').style.display='none';document.getElementById('propsShape').style.display='none';document.getElementById('propsImage').style.display='none';});
fCanvas.on('object:modified',()=>{saveHistory();updateLayers();});

function showProps(){
  const obj=fCanvas.getActiveObject();if(!obj)return;
  document.getElementById('propsText').style.display='none';
  document.getElementById('propsShape').style.display='none';
  document.getElementById('propsImage').style.display='none';
  if(obj.type==='i-text'||obj.type==='text'||obj.type==='textbox'){
    document.getElementById('propsText').style.display='block';
    document.getElementById('pTxt').value=obj.text||'';
    document.getElementById('pFont').value=obj.fontFamily||'Impact';
    document.getElementById('pSize').value=obj.fontSize||60;
    document.getElementById('pColor').value=obj.fill||'#ffffff';
    document.getElementById('pColorH').value=obj.fill||'#ffffff';
    document.getElementById('pStroke').value=obj.stroke||'#000000';
    document.getElementById('pStrokeW').value=obj.strokeWidth||0;
    if(obj.shadow){document.getElementById('pShadowC').value=obj.shadow.color||'#000';document.getElementById('pShadowB').value=obj.shadow.blur||0;}
    document.getElementById('pSpacing').value=obj.charSpacing||0;
  } else if(obj.type==='image'){
    document.getElementById('propsImage').style.display='block';
    document.getElementById('pImgOpacity').value=(obj.opacity||1)*100;
  } else {
    document.getElementById('propsShape').style.display='block';
    document.getElementById('pShapeColor').value=obj.stroke||'#ef4444';
    document.getElementById('pShapeFill').value=obj.fill==='transparent'?'#000000':obj.fill||'#000000';
    document.getElementById('pShapeW').value=obj.strokeWidth||4;
    document.getElementById('pOpacity').value=(obj.opacity||1)*100;
  }
}

function updateProp(prop,val){const obj=fCanvas.getActiveObject();if(!obj)return;obj.set(prop,val);fCanvas.renderAll();saveHistory();if(prop==='text')updateLayers();}
function updateShadow(){const obj=fCanvas.getActiveObject();if(!obj)return;obj.set('shadow',new fabric.Shadow({color:document.getElementById('pShadowC').value,blur:+document.getElementById('pShadowB').value,offsetX:3,offsetY:3}));fCanvas.renderAll();saveHistory();}
function updateShapeProp(prop,val){const obj=fCanvas.getActiveObject();if(!obj)return;obj.set(prop,val);fCanvas.renderAll();saveHistory();}

// Layers
function updateLayers(){
  const list=document.getElementById('layersList');list.innerHTML='';
  const objs=fCanvas.getObjects();
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];const active=fCanvas.getActiveObject()===o;
    const name=o.name||(o.type==='i-text'?'T: '+o.text?.substring(0,12):o.type);
    const div=document.createElement('div');div.className='ly'+(active?' active':'');
    div.innerHTML=`<span>${name}</span>${o.name!=='background'?'<button class="ly-del" onclick="delLayer('+i+')">✕</button>':''}`;
    div.onclick=()=>{fCanvas.setActiveObject(objs[i]);fCanvas.renderAll();showProps();updateLayers();};
    list.appendChild(div);
  }
}

function delLayer(i){const objs=fCanvas.getObjects();if(objs[i]&&objs[i].name!=='background'){fCanvas.remove(objs[i]);fCanvas.renderAll();saveHistory();updateLayers();}}

// Controls
function deleteObj(){const obj=fCanvas.getActiveObject();if(obj&&obj.name!=='background'){fCanvas.remove(obj);fCanvas.renderAll();saveHistory();updateLayers();}}
function duplicateObj(){const obj=fCanvas.getActiveObject();if(!obj)return;obj.clone(c=>{c.set({left:obj.left+20,top:obj.top+20,name:obj.name});fCanvas.add(c);fCanvas.setActiveObject(c);fCanvas.renderAll();saveHistory();updateLayers();});}
function bringForward(){const obj=fCanvas.getActiveObject();if(obj){fCanvas.bringForward(obj);fCanvas.renderAll();updateLayers();}}
function sendBackward(){const obj=fCanvas.getActiveObject();if(obj&&obj.name!=='background'){fCanvas.sendBackwards(obj);fCanvas.renderAll();updateLayers();}}
function centerObj(){const obj=fCanvas.getActiveObject();if(obj){obj.set({left:W/2,top:H/2,originX:'center',originY:'center'});fCanvas.renderAll();saveHistory();}}
function rotateObj(deg){const obj=fCanvas.getActiveObject();if(obj){obj.rotate((obj.angle||0)+deg);fCanvas.renderAll();saveHistory();}}
function lockObj(){const obj=fCanvas.getActiveObject();if(!obj||obj.name==='background')return;const locked=!obj.lockMovementX;obj.set({lockMovementX:locked,lockMovementY:locked,lockScalingX:locked,lockScalingY:locked,lockRotation:locked,hasControls:!locked});fCanvas.renderAll();updateLayers();}

// Filtros de imagem ajustáveis
function applyImgFilters(){
  const obj=fCanvas.getActiveObject();if(!obj||obj.type!=='image')return;
  const b=+document.getElementById('pBrightness').value/100;
  const c=+document.getElementById('pContrast').value/100;
  const bl=+document.getElementById('pBlur').value/100;
  obj.filters=[];
  if(b!==0)obj.filters.push(new fabric.Image.filters.Brightness({brightness:b}));
  if(c!==0)obj.filters.push(new fabric.Image.filters.Contrast({contrast:c}));
  if(bl>0)obj.filters.push(new fabric.Image.filters.Blur({blur:bl}));
  obj.applyFilters();fCanvas.renderAll();saveHistory();
}

// Integração IA
async function enviarParaIA(){
  const dataURL=fCanvas.toDataURL({format:'png',multiplier:1});
  const instrucao=prompt('Instrução de edição por IA:');
  if(!instrucao)return;
  try{
    const blob=await(await fetch(dataURL)).blob();
    const fd=new FormData();fd.append('imagem',blob,'thumb.png');fd.append('instrucao',instrucao);
    const res=await fetch('/thumb_editor/editar',{method:'POST',body:fd});
    const d=await res.json();
    if(d.erro){alert('❌ '+d.erro);return;}
    // Carregar resultado como novo fundo
    fabric.Image.fromURL(`/thumb_editor/ver/${d.edit_id}?t=${Date.now()}`,img=>{
      if(!img)return;
      const scale=Math.max(W/img.width,H/img.height);
      img.set({scaleX:scale,scaleY:scale,left:W/2,top:H/2,originX:'center',originY:'center',selectable:false,evented:false,name:'background'});
      // Remover fundo antigo
      const bg=fCanvas.getObjects().find(o=>o.name==='background');
      if(bg)fCanvas.remove(bg);
      fCanvas.insertAt(img,0);fCanvas.renderAll();saveHistory();updateLayers();
      alert('✅ Edição por IA aplicada!');
    },{crossOrigin:'anonymous'});
  }catch(e){alert('❌ Erro: '+e.message);}
}

async function viralTuningEditor(){
  const dataURL=fCanvas.toDataURL({format:'png',multiplier:1});
  try{
    const blob=await(await fetch(dataURL)).blob();
    const fd=new FormData();fd.append('imagem',blob,'thumb.png');
    const res=await fetch('/thumb_editor/viral_tuning',{method:'POST',body:fd});
    const d=await res.json();
    if(d.erro){alert('❌ '+d.erro);return;}
    fabric.Image.fromURL(`/thumb_editor/ver/${d.edit_id}?t=${Date.now()}`,img=>{
      if(!img)return;
      const scale=Math.max(W/img.width,H/img.height);
      img.set({scaleX:scale,scaleY:scale,left:W/2,top:H/2,originX:'center',originY:'center',selectable:false,evented:false,name:'background'});
      const bg=fCanvas.getObjects().find(o=>o.name==='background');
      if(bg)fCanvas.remove(bg);
      fCanvas.insertAt(img,0);fCanvas.renderAll();saveHistory();updateLayers();
      alert('✅ Viral Tuning aplicado!');
    },{crossOrigin:'anonymous'});
  }catch(e){alert('❌ Erro: '+e.message);}
}

async function salvarNaBiblioteca(){
  const dataURL=fCanvas.toDataURL({format:'png',multiplier:1});
  try{
    const blob=await(await fetch(dataURL)).blob();
    const fd=new FormData();fd.append('imagem',blob,'thumb_editor.png');
    const res=await fetch('/thumb_editor/salvar_biblioteca',{method:'POST',body:fd});
    const d=await res.json();
    if(d.ok)alert('✅ Salvo na biblioteca!');
    else alert('❌ '+(d.erro||'Erro'));
  }catch(e){alert('❌ Erro ao salvar');}
}

// History (undo/redo)
function saveHistory(){
  if(ignoreHistory)return;
  const json=JSON.stringify(fCanvas.toJSON(['name','selectable','evented']));
  history=history.slice(0,historyIdx+1);history.push(json);historyIdx=history.length-1;
  if(history.length>30){history.shift();historyIdx--;}
}
function undo(){if(historyIdx<=0)return;historyIdx--;loadHistory();}
function redo(){if(historyIdx>=history.length-1)return;historyIdx++;loadHistory();}
function loadHistory(){ignoreHistory=true;fCanvas.loadFromJSON(history[historyIdx],()=>{fCanvas.renderAll();updateLayers();ignoreHistory=false;});}

// Export
function exportPNG(w,h){
  const scale=w/W;
  const dataURL=fCanvas.toDataURL({format:'png',multiplier:scale,quality:1});
  const link=document.createElement('a');link.download=`thumbnail_${w}x${h}.png`;link.href=dataURL;link.click();
}

// Save project
async function saveProject(){
  const json=fCanvas.toJSON(['name','selectable','evented']);
  const dataURL=fCanvas.toDataURL({format:'png',multiplier:1,quality:0.9});
  try{
    const res=await fetch('/thumb_editor/save_project',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:json,preview:dataURL})});
    const d=await res.json();
    if(d.ok)alert('✅ Projeto salvo!');else alert('❌ '+(d.erro||'Erro'));
  }catch(e){alert('❌ Erro ao salvar');}
}

// Load project from URL
const projId=new URLSearchParams(window.location.search).get('project');
if(projId){
  fetch(`/thumb_editor/load_project/${projId}`).then(r=>r.json()).then(d=>{
    if(d.project){ignoreHistory=true;fCanvas.loadFromJSON(d.project,()=>{fCanvas.renderAll();document.getElementById('uploadOverlay').style.display='none';saveHistory();updateLayers();ignoreHistory=false;});}
  });
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Delete'||e.key==='Backspace')deleteObj();
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
  if(e.ctrlKey&&e.key==='d'){e.preventDefault();duplicateObj();}
});

saveHistory();
</script>
