<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Kaelum Studio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#111827;border:1px solid #1e3a5f;border-radius:16px;padding:36px 28px;width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:1.5rem;font-weight:700}.logo span{color:#4a9eff}
    .logo p{font-size:.82rem;color:#94a3b8;margin-top:6px}
    .logo .subtitle{font-size:.72rem;color:#475569;margin-top:2px;letter-spacing:2px;text-transform:uppercase}
    label{display:block;font-size:.82rem;color:#94a3b8;margin-bottom:6px;margin-top:16px}
    input{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #1e3a5f;border-radius:8px;color:#e2e8f0;font-size:.9rem;outline:none;transition:border-color .2s}
    input:focus{border-color:#4a9eff}
    .btn{width:100%;margin-top:22px;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
    .btn:hover{background:#1d4ed8}
    .link{text-align:center;margin-top:16px;font-size:.85rem;color:#94a3b8}
    .link a{color:#4a9eff;text-decoration:none}
    .erro{display:none;margin-top:14px;background:#1a0a0a;border:1px solid #7f1d1d;border-radius:8px;padding:12px;color:#fca5a5;font-size:.85rem;text-align:center}
    .link-forgot{text-align:center;margin-top:10px;font-size:.8rem}
    .link-forgot a{color:#475569;text-decoration:none}
    .link-forgot a:hover{color:#4a9eff}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Kaelum <span>Studio</span></h1>
    <div class="subtitle">AI Video Automation</div>
    <p>Entre na sua conta</p>
  </div>
  <label>Email</label>
  <input type="email" id="email" placeholder="seu@email.com"/>
  <label>Senha</label>
  <input type="password" id="senha" placeholder="••••••••"/>
  <button class="btn" id="btnLogin">Entrar</button>
  <div class="erro" id="erro"></div>
  <div class="link">Não tem conta? <a href="/cadastro">Cadastre-se</a></div>
</div>
<script>
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    if (!email || !senha) { mostrarErro('Preencha todos os campos'); return; }
    try {
      const res = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, senha}) });
      const data = await res.json();
      if (data.ok) window.location.href = '/dashboard';
      else mostrarErro(data.erro);
    } catch(e) { mostrarErro('Erro de conexão'); }
  });
  document.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btnLogin').click(); });
  function mostrarErro(msg) { const e=document.getElementById('erro'); e.textContent='❌ '+msg; e.style.display='block'; }
</script>
</body>
</html>
