events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name mordomo.virtual.grupomafort.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name mordomo.virtual.grupomafort.com;

        ssl_certificate /etc/letsencrypt/live/mordomo.virtual.grupomafort.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mordomo.virtual.grupomafort.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
        }

        # Static cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://frontend:80;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Kiro Mobile Bridge
    server {
        listen 80;
        server_name kiro.grupomafort.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Kiro Mobile Bridge HTTPS
    server {
        listen 443 ssl;
        server_name kiro.grupomafort.com;

        ssl_certificate /etc/letsencrypt/live/kiro.grupomafort.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kiro.grupomafort.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://172.17.0.1:9090;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://172.17.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    # Kaelum Studio (Veo3)
    server {
        listen 80;
        server_name kaelumstudio.grupomafort.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 200M;
        }
    }

    # Kaelum Studio HTTPS
    server {
        listen 443 ssl;
        server_name kaelumstudio.grupomafort.com;

        ssl_certificate /etc/letsencrypt/live/kaelumstudio.grupomafort.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kaelumstudio.grupomafort.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://172.17.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 200M;
        }
    }

    # Studio Klyonclaw (novo dominio)
    server {
        listen 80;
        server_name studio.klyonclaw.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://172.17.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 200M;
        }
    }

    # Studio Klyonclaw HTTPS - OTIMIZADO
    server {
        listen 443 ssl;
        server_name studio.klyonclaw.com;

        ssl_certificate /etc/letsencrypt/live/studio.klyonclaw.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/studio.klyonclaw.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 200M;

        # Cache de arquivos estaticos - nao passa pelo Python
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|mp3|wav|ogg|m4a)$ {
            proxy_pass http://172.17.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering on;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Videos - buffer grande
        location ~* \.(mp4)$ {
            proxy_pass http://172.17.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering on;
            proxy_max_temp_file_size 200m;
            expires 1d;
            add_header Cache-Control "public";
        }

        # App
        location / {
            proxy_pass http://172.17.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
